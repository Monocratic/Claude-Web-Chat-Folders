<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CWCF Storage Tests</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0E0B1A;
      color: #E5E0F0;
      max-width: 880px;
      margin: 0 auto;
      padding: 24px;
      line-height: 1.5;
    }
    h1 { margin: 0 0 4px; font-size: 20px; }
    .subtitle { color: #9A8FB5; margin: 0 0 24px; font-size: 13px; }
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    button {
      background: #1E1830;
      color: #E5E0F0;
      border: 1px solid #3D3252;
      border-radius: 6px;
      padding: 8px 16px;
      font: inherit;
      cursor: pointer;
    }
    button:hover { border-color: #A78BFA; }
    button.danger { border-color: #B14A6E; }
    button.danger:hover { background: #2A1622; border-color: #FF6B9D; }
    button.primary { background: #6D4DCD; border-color: #A78BFA; }
    button.primary:hover { background: #7E5FE0; }
    .stats {
      background: #1E1830;
      border: 1px solid #3D3252;
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #C4B8DC;
    }
    .stats .ok { color: #6FD08C; }
    .stats .fail { color: #FF6B9D; }
    pre#output {
      background: #1E1830;
      border: 1px solid #3D3252;
      border-radius: 6px;
      padding: 16px;
      font-size: 13px;
      max-height: 70vh;
      overflow: auto;
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .pass { color: #6FD08C; }
    .fail { color: #FF6B9D; }
    .skip { color: #9A8FB5; }
    .err { color: #FF6B9D; padding-left: 4ch; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Claude Web Chat Folders - Storage Tests</h1>
  <p class="subtitle">Verifies storage layer in isolation. Running tests wipes <code>chrome.storage.local</code>; back up first.</p>

  <div class="controls">
    <button id="btn-backup">Back up current state</button>
    <button id="btn-run" class="primary">Run tests (auto-backs up first, then wipes)</button>
    <button id="btn-wipe" class="danger">Wipe storage</button>
    <button id="btn-stats">Refresh stats</button>
  </div>

  <div class="stats" id="stats">Loading...</div>

  <pre id="output">Ready. Click "Back up current state" if you have data to preserve, then "Run tests".</pre>

  <script type="module" src="storage-tests.js"></script>
</body>
</html>
