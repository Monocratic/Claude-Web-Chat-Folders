<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="55%" stop-color="#5B21B6"/>
      <stop offset="100%" stop-color="#1E0A3C"/>
    </radialGradient>
    <linearGradient id="folderBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="folderTab" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#DDD6FE"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BEF264"/>
      <stop offset="100%" stop-color="#65A30D"/>
    </linearGradient>
    <filter id="sparkGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background squircle, slightly tighter corners for stronger silhouette -->
  <path d="M 30 4 Q 4 4 4 30 L 4 98 Q 4 124 30 124 L 98 124 Q 124 124 124 98 L 124 30 Q 124 4 98 4 Z" fill="url(#bgGlow)"/>
  
  <!-- Top highlight on squircle -->
  <path d="M 30 4 Q 4 4 4 30 L 4 36 Q 4 10 30 10 L 98 10 Q 124 10 124 36 L 124 30 Q 124 4 98 4 Z" fill="#FFFFFF" opacity="0.1"/>
  
  <!-- Folder, scaled larger and centered for impact at small sizes -->
  <!-- Tab -->
  <path d="M 26 36 L 26 46 L 56 46 L 62 52 L 102 52 L 102 36 Q 102 32 98 32 L 30 32 Q 26 32 26 36 Z" fill="url(#folderTab)"/>
  
  <!-- Body -->
  <path d="M 22 50 Q 22 46 26 46 L 102 46 Q 106 46 106 50 L 106 100 Q 106 106 100 106 L 28 106 Q 22 106 22 100 Z" fill="url(#folderBody)"/>
  
  <!-- Folder top edge highlight -->
  <path d="M 22 50 Q 22 46 26 46 L 102 46 Q 106 46 106 50 L 106 54 L 22 54 Z" fill="#FFFFFF" opacity="0.22"/>
  
  <!-- Folder shadow at bottom -->
  <path d="M 22 96 L 106 96 L 106 100 Q 106 106 100 106 L 28 106 Q 22 106 22 100 Z" fill="#000000" opacity="0.12"/>
  
  <!-- Chat content lines — bolder, fewer, higher contrast for small-size legibility -->
  <g>
    <!-- Top line -->
    <rect x="34" y="64" width="50" height="5" rx="2.5" fill="#FFFFFF" opacity="0.92"/>
    <!-- Middle line — green accent (the "highlighted/active chat") -->
    <rect x="34" y="76" width="42" height="5" rx="2.5" fill="url(#greenGlow)" filter="url(#sparkGlow)"/>
    <!-- Bottom line -->
    <rect x="34" y="88" width="56" height="5" rx="2.5" fill="#FFFFFF" opacity="0.78"/>
  </g>
  
  <!-- Outer rim glow -->
  <path d="M 30 4 Q 4 4 4 30 L 4 98 Q 4 124 30 124 L 98 124 Q 124 124 124 98 L 124 30 Q 124 4 98 4 Z" fill="none" stroke="#A78BFA" stroke-width="0.6" opacity="0.5"/>
</svg>
