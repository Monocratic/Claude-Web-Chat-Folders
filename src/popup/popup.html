<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Claude Chat Folders</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup" id="popup">
    <header class="popup__header">
      <div class="popup__brand">
        <img class="popup__brand-icon" src="../../icons/icon32.png" alt="" width="24" height="24">
        <h1 class="popup__brand-title">Claude Folders</h1>
      </div>
      <span class="popup__version" id="popup-version"></span>
    </header>

    <section class="popup__status" id="popup-status" data-state="checking">
      <span class="popup__status-dot"></span>
      <span class="popup__status-text" id="popup-status-text">Checking…</span>
    </section>

    <section class="popup__toggle">
      <label class="popup__toggle-label" for="popup-ui-toggle">
        <input type="checkbox" id="popup-ui-toggle" class="popup__toggle-checkbox">
        <span class="popup__toggle-track"><span class="popup__toggle-thumb"></span></span>
        <span class="popup__toggle-text">
          <span class="popup__toggle-title">Show folder UI on claude.ai</span>
          <span class="popup__toggle-hint">Hide the strip and panel without uninstalling.</span>
        </span>
      </label>
    </section>

    <section class="popup__actions">
      <button type="button" class="popup__btn popup__btn--primary" id="popup-btn-settings">
        <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
          <path d="M8 5.5a2.5 2.5 0 100 5 2.5 2.5 0 000-5zM8 1l1 2 2 .5 1.5 1.5L12 7l1 2-1.5 2L9 12l-1 2-1-2-2-.5L3.5 10 4 8 3 6l1.5-2L7 3l1-2z" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
        </svg>
        Open full settings
      </button>
      <button type="button" class="popup__btn" id="popup-btn-sync">
        <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
          <path d="M3 8a5 5 0 018.66-3.4M13 8a5 5 0 01-8.66 3.4M11 2v3h-3M5 14v-3h3" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Sync all chats
      </button>
    </section>

    <footer class="popup__footer">
      <a class="popup__link" href="https://github.com/Monocratic/Claude-Web-Chat-Folders" target="_blank" rel="noopener">github.com/Monocratic/Claude-Web-Chat-Folders</a>
    </footer>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
