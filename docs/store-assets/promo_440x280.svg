<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 280" width="440" height="280">
  <defs>
    <radialGradient id="bgGlow" cx="35%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="55%" stop-color="#5B21B6"/>
      <stop offset="100%" stop-color="#1E0A3C"/>
    </radialGradient>
    <linearGradient id="folderBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="folderTab" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#DDD6FE"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BEF264"/>
      <stop offset="100%" stop-color="#65A30D"/>
    </linearGradient>
    <filter id="sparkGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feFlood flood-color="#1E0A3C" flood-opacity="0.6"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="tileClip">
      <rect x="0" y="0" width="440" height="280"/>
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="440" height="280" fill="url(#bgGlow)"/>
  
  <!-- Subtle dot accents -->
  <g clip-path="url(#tileClip)" opacity="0.4">
    <circle cx="40" cy="30" r="1.2" fill="#A78BFA"/>
    <circle cx="380" cy="20" r="1.4" fill="#A78BFA"/>
    <circle cx="410" cy="80" r="0.9" fill="#C4B5FD"/>
    <circle cx="20" cy="120" r="1.1" fill="#C4B5FD"/>
    <circle cx="395" cy="200" r="1.3" fill="#A78BFA"/>
    <circle cx="50" cy="240" r="0.9" fill="#A78BFA"/>
    <circle cx="380" cy="250" r="0.8" fill="#C4B5FD"/>
    <circle cx="80" cy="180" r="0.6" fill="#A3E635" opacity="0.6"/>
    <circle cx="420" cy="140" r="0.7" fill="#A3E635" opacity="0.5"/>
  </g>
  
  <!-- Top edge highlight -->
  <rect x="0" y="0" width="440" height="6" fill="#FFFFFF" opacity="0.08"/>
  
  <!-- Folder graphic (left third of tile) -->
  <g transform="translate(40, 70)">
    <!-- Folder tab -->
    <path d="M 8 10 L 8 22 L 60 22 L 68 30 L 132 30 L 132 10 Q 132 6 128 6 L 12 6 Q 8 6 8 10 Z" fill="url(#folderTab)"/>
    
    <!-- Folder body -->
    <path d="M 0 26 Q 0 22 4 22 L 132 22 Q 136 22 136 26 L 136 130 Q 136 138 128 138 L 8 138 Q 0 138 0 130 Z" fill="url(#folderBody)"/>
    
    <!-- Folder body top edge highlight -->
    <path d="M 0 26 Q 0 22 4 22 L 132 22 Q 136 22 136 26 L 136 30 L 0 30 Z" fill="#FFFFFF" opacity="0.22"/>
    
    <!-- Folder shadow at bottom -->
    <path d="M 0 124 L 136 124 L 136 130 Q 136 138 128 138 L 8 138 Q 0 138 0 130 Z" fill="#000000" opacity="0.12"/>
    
    <!-- Chat content lines -->
    <rect x="14" y="48" width="80" height="6" rx="3" fill="#FFFFFF" opacity="0.92"/>
    <rect x="14" y="64" width="68" height="6" rx="3" fill="url(#greenGlow)" filter="url(#sparkGlow)"/>
    <rect x="14" y="80" width="92" height="6" rx="3" fill="#FFFFFF" opacity="0.78"/>
    <rect x="14" y="96" width="74" height="6" rx="3" fill="#FFFFFF" opacity="0.62"/>
    <rect x="14" y="112" width="58" height="6" rx="3" fill="#FFFFFF" opacity="0.48"/>
  </g>
  
  <!-- Text block (right two-thirds) -->
  <g filter="url(#textShadow)">
    <!-- Main title -->
    <text x="200" y="118" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="30" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">
      Claude Web
    </text>
    <text x="200" y="152" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="30" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">
      Chat Folders
    </text>
  </g>
  
  <!-- Tagline -->
  <text x="200" y="184" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="400" fill="#C4B5FD" letter-spacing="0.2">
    Privacy-first folder organization
  </text>
  
  <!-- Accent underline on tagline -->
  <rect x="200" y="194" width="48" height="2.5" rx="1.25" fill="url(#greenGlow)" filter="url(#sparkGlow)"/>
  
  <!-- Bottom right corner accent dots -->
  <g opacity="0.6">
    <circle cx="408" cy="248" r="2" fill="#BEF264" filter="url(#sparkGlow)"/>
    <circle cx="420" cy="240" r="1.2" fill="#A78BFA"/>
    <circle cx="396" cy="240" r="1" fill="#C4B5FD"/>
  </g>
</svg>
